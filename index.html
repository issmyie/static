<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Character Gallery</title>
   
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        
        body {
            background-color: #5f648e;
           font-family: monospace;
        }

     
        .navbar-brand i {
            color: #568377;
        }

        .hero {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #5f648e;
            padding: 4rem 0 3rem;
            border-radius: 0 0 2rem 2rem;
            margin-bottom: 2rem;
        }
        .hero h1 {
            font-weight: 700;
            letter-spacing: 1px;
        }
        .hero p {
            color: #5f648e;
            max-width: 600px;
            margin: 0 auto;
        }




        
        .search-wrapper {
            max-width: 500px;
            margin: 0 auto;
        }
        .search-wrapper .form-control {
            border-radius: 50px 0 0 50px;
            border: none;
            padding: 0.65rem 1.25rem;
            box-shadow: 0 4px 12px rgba(61, 66, 114, 0.08);
        }
        .search-wrapper .btn {
            border-radius: 0 50px 50px 0;
            padding: 0.65rem 1.5rem;
            background-color: #397a5c;
            color: #1a1a2e;
            font-weight: 600;
            border: none;
        }
        .search-wrapper .btn:hover {
            background-color: #397a5c;
        }



          .character-card {
            transition: transform 0.25s ease, box-shadow 0.3s ease;
            border: none;
            border-radius: 1rem;
            overflow: hidden;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.06);
            height: 100%;
            background: #20214b;
        }
        .character-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.12);
        }
        .character-card .card-img-top {
            height: 200px;
            object-fit: cover;
            background: #20214b;
        }
        .character-card .card-body {
            padding: 1.25rem 1.25rem 1rem;
        }
        .character-card .card-title {
            font-weight: 700;
            font-size: 1.2rem;
            margin-bottom: 0.2rem;
        }
        .character-card .card-subtitle {
            font-size: 0.85rem;
            color: #6c757d;
            font-weight: 500;
        }
        .character-card .badge-role {
            background-color: #20214b;
            color: #1a1a2e;
            font-weight: 500;
            padding: 0.3rem 0.8rem;
            border-radius: 50px;
            font-size: 0.75rem;
        }
        .character-card .card-text {
            font-size: 0.92rem;
            color:#20214b;
            margin-top: 0.6rem;
        }
        .character-card .btn-outline-dark {
            border-radius: 50px;
            font-weight: 500;
            font-size: 0.85rem;
            padding: 0.35rem 1.2rem;
            border-color: #20214b;
            color: #1a1a2e;
        }
        .character-card .btn-outline-dark:hover {
            background-color: #1a1a2e;
            color: #fff;
            border-color: #1a1a2e;
        }
.details-hero {
            background: linear-gradient(135deg, #0f3460, #1a1a2e);
            color: #fff;
            padding: 3rem 0 2.5rem;
            border-radius: 0 0 2rem 2rem;
            margin-bottom: 2.5rem;
        }
        .details-hero h1 {
            font-weight: 700;
        }
        .details-img {
            border-radius: 1.5rem;
            box-shadow: 0 12px 36px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-height: 400px;
            object-fit: cover;
        }
        .details-section {
            background: #fff;
            border-radius: 1.5rem;
            padding: 2rem;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.04);
            margin-bottom: 2rem;
        }
        .details-section h3 {
            font-weight: 700;
            color: #1a1a2e;
            border-bottom: 3px solid #ffc107;
            padding-bottom: 0.5rem;
            display: inline-block;
        }
        .details-section .detail-item {
            display: flex;
            padding: 0.5rem 0;
            border-bottom: 1px solid #f1f3f5;
        }
        .details-section .detail-item .label {
            font-weight: 600;
            width: 140px;
            color: #4a4a5a;
            flex-shrink: 0;
        }
        .details-section .detail-item .value {
            color: #1a1a2e;
        }

         .about-hero {
            background: linear-gradient(135deg, #16213e, #0f3460);
            color: #fff;
            padding: 3rem 0 2.5rem;
            border-radius: 0 0 2rem 2rem;
            margin-bottom: 2.5rem;
        }
        .about-img {
            border-radius: 1.5rem;
            box-shadow: 0 12px 36px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-height: 350px;
            object-fit: cover;
        }
        .about-text {
            font-size: 1.05rem;
            line-height: 1.8;
            color: #2d2d3f;
        }

        /* form page */
        .form-hero {
            background: linear-gradient(135deg, #1a1a2e, #0f3460);
            color: #fff;
            padding: 3rem 0 2.5rem;
            border-radius: 0 0 2rem 2rem;
            margin-bottom: 2.5rem;
        }
        .form-card {
            background: #fff;
            border-radius: 1.5rem;
            padding: 2.5rem;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.06);
        }
        .form-card label {
            font-weight: 600;
            color: #1a1a2e;
        }
        .form-card .form-control,
        .form-card .form-select {
            border-radius: 0.75rem;
            border: 1px solid #dee2e6;
            padding: 0.65rem 1rem;
            transition: border-color 0.2s;
        }
        .form-card .form-control:focus,
        .form-card .form-select:focus {
            border-color: #ffc107;
            box-shadow: 0 0 0 0.2rem rgba(255, 193, 7, 0.25);
        }
        .form-card .btn-submit {
            background-color: #ffc107;
            color: #1a1a2e;
            font-weight: 700;
            padding: 0.7rem 2.5rem;
            border-radius: 50px;
            border: none;
            transition: background 0.2s;
        }
        .form-card .btn-submit:hover {
            background-color: #e0a800;
        }
         .footer {
            background: #1a1a2e;
            color: #cbd5e1;
            padding: 1.8rem 0;
            margin-top: 3rem;
            border-radius: 2rem 2rem 0 0;
        }
        .footer a {
            color: #ffc107;
            text-decoration: none;
        }
        .footer a:hover {
            text-decoration: underline;
        }

        /* responsive tweaks */
        @media (max-width: 576px) {
            .hero h1 {
                font-size: 1.8rem;
            }
            .details-section .detail-item {
                flex-wrap: wrap;
            }
            .details-section .detail-item .label {
                width: 100%;
                margin-bottom: 0.1rem;
            }
            .form-card {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>

                        <i class="fas fa-home me-1"></i>Home
                    </a>

                    <a class="nav-link" href="details.html">
                        <i class="fas fa-user-circle me-1"></i>Details
                    </a>

                <li class="nav-item">

    </div>
